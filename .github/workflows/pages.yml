# Build the React app in demo mode and deploy to GitHub Pages.
# Demo mode (REACT_APP_DEMO=true) mocks all /api/* calls in the browser,
# so the demo is free to host - no backend or AWS resources.
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          REACT_APP_DEMO: "true"
          PUBLIC_URL: /greenstay
          CI: "false"
      # SPA fallback so client-side routes survive refresh on Pages
      - run: cp build/index.html build/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build
      - id: deployment
        uses: actions/deploy-pages@v4
