apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: greenstay
  namespace: greenstay
  labels:
    app.kubernetes.io/part-of: greenstay
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
