server {
    listen 80;

    # 1. Use Docker's internal DNS to resolve hostnames at runtime
    # 127.0.0.11 is the standard Docker DNS server IP
    resolver 127.0.0.11 valid=30s;

    # Serve the React Frontend
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Backend
    location /api {
        # 2. Use a variable for the upstream URL
        # This forces Nginx to resolve 'backend' only when a request is made,
        # preventing the crash if the backend isn't ready instantly on startup.
        set $backend "http://backend:5000";
        
        proxy_pass $backend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}